<!DOCTYPE html>
<html lang="en">
<head>

  <style>
      /* --- QUIZ SPECIFIC STYLES --- */
      
      #quizContainer {
          max-width: 700px;
          margin: 0 auto;
          text-align: center;
          background-color: #fff;
          border-radius: 12px;
          padding: 30px;
          box-shadow: 0 4px 15px rgba(0,0,0,0.1);
          border: 1px solid #ddd;
      }

      /* Header Layout */
      .header-grid-container {
          text-align: center;
          position: relative;
          margin-bottom: 15px;
          width: 95%;
          max-width: 1400px;
          margin-left: auto;
          margin-right: auto;
      }

      .back-link-wrapper {
          position: absolute;
          left: 0;
          top: 50%;
          transform: translateY(-50%);
      }

      /* Mode Switcher Buttons */
      .mode-toggle-container {
          display: flex;
          justify-content: center;
          gap: 10px;
          margin-bottom: 30px;
      }
      
      .mode-btn {
          padding: 10px 20px;
          border: 2px solid #ccc;
          background: #f9f9f9;
          border-radius: 25px;
          cursor: pointer;
          font-weight: bold;
          font-size: 16px;
          transition: all 0.2s;
          color: #555;
      }
      
      .mode-btn.active {
          border-color: #1a73e8;
          background: #e8f0fe;
          color: #1a73e8;
      }

      /* Question Area */
      .question-box {
          margin-bottom: 25px;
      }

      .prompt-label {
          font-size: 18px;
          color: #666;
          margin-bottom: 10px;
          text-transform: uppercase;
          letter-spacing: 1px;
          font-weight: bold;
      }

      .main-question {
          font-size: 32px;
          font-weight: bold;
          color: #333;
          margin: 10px 0 20px 0;
      }
      
      /* Input Styling */
      input.answer-input {
          font-size: 24px;
          padding: 10px;
          width: 80%;
          max-width: 300px;
          text-align: center;
          border: 2px solid #ccc;
          border-radius: 8px;
          outline: none;
          font-family: inherit;
      }

      input.answer-input:focus {
          border-color: #1a73e8;
      }

      input.answer-input.correct {
          border-color: #2e7d32;
          background-color: #e8f5e9;
          color: #2e7d32;
      }

      input.answer-input.incorrect {
          border-color: #c62828;
          background-color: #ffebee;
          color: #c62828;
      }

      /* Feedback & Controls */
      .feedback-msg {
          min-height: 24px;
          margin-top: 15px;
          font-weight: bold;
          font-size: 18px;
      }
      
      .check-btn {
          margin-top: 20px;
          padding: 12px 30px;
          font-size: 18px;
          background-color: #333;
          color: white;
          border: none;
          border-radius: 30px;
          cursor: pointer;
          transition: transform 0.1s;
      }
      
      .check-btn:hover {
          transform: scale(1.05);
          background-color: #555;
      }
      
      /* Stats */
      .stats-bar {
          margin-top: 30px;
          font-size: 14px;
          color: #888;
          border-top: 1px solid #eee;
          padding-top: 15px;
          display: flex;
          justify-content: space-between;
      }

      /* --- DARK MODE OVERRIDES --- */
      body.dark-mode #quizContainer {
          background-color: #1e1e1e;
          border-color: #444;
      }
      
      body.dark-mode .main-question { color: #f0f0f0; }
      body.dark-mode .prompt-label { color: #aaa; }
      
      body.dark-mode input.answer-input {
          background-color: #2c2c2c;
          border-color: #555;
          color: #fff;
      }
      
      body.dark-mode .mode-btn {
          background-color: #2c2c2c;
          border-color: #555;
          color: #aaa;
      }
      
      body.dark-mode .mode-btn.active {
          background-color: #3d3d3d;
          border-color: #8ab4f8;
          color: #8ab4f8;

</head>

    /* --- GAME STATE --- */
    let currentMode = 'drill'; 
    let currentItem = null;
    let isChecking = true; 
    let score = 0;
    let total = 0;
    let streak = 0;

    // Elements
    const qText = document.getElementById('questionText');
    const pLabel = document.getElementById('promptLabel');
    const input = document.getElementById('userAnswer');
    const feedback = document.getElementById('feedback');
    const btn = document.getElementById('actionBtn');
    const streakDisplay = document.getElementById('streakDisplay');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const modeBtns = document.querySelectorAll('.mode-btn');

    // Init
    window.addEventListener('DOMContentLoaded', () => {
        nextQuestion();
        
        input.addEventListener('keyup', (e) => {
            if (e.key === 'Enter') handleAction();
        });
    });

    function setMode(mode) {
        currentMode = mode;
        modeBtns.forEach(b => b.classList.remove('active'));
        if(mode === 'drill') modeBtns[0].classList.add('active');
        else modeBtns[1].classList.add('active');
        resetGame();
    }

    function resetGame() {
        score = 0;
        total = 0;
        streak = 0;
        updateStats();
        nextQuestion();
    }

    function nextQuestion() {
        // Reset UI
        input.value = "";
        input.className = "answer-input";
        input.disabled = false;
        input.focus();
        feedback.textContent = "";
        btn.textContent = "Check";
        isChecking = true;

        if (currentMode === 'drill') {
            currentItem = drillData[Math.floor(Math.random() * drillData.length)];
            
            // DYNAMIC PROMPT: Tells user which tense to use
            pLabel.textContent = `Conjugate: ${currentItem.tense}`;
            
            // Display: "Yo / Hablar"
            qText.textContent = `${currentItem.pronoun} / ${currentItem.verb}`;
            
        } else {
            pLabel.textContent = "Complete the Sentence";
            currentItem = sentenceData[Math.floor(Math.random() * sentenceData.length)];
            qText.textContent = currentItem.text;
        }
    }

    function handleAction() {
        if (isChecking) checkAnswer();
        else nextQuestion();
    }

    function checkAnswer() {
        const userVal = input.value.trim().toLowerCase();
        const correctVal = currentItem.answer.toLowerCase();

        if (userVal === correctVal) {
            input.classList.add('correct');
            feedback.textContent = "✅ Correct!";
            feedback.style.color = "green";
            score++;
            streak++;
        } else {
            input.classList.add('incorrect');
            feedback.textContent = `❌ Incorrect. Answer: ${currentItem.answer}`;
            feedback.style.color = "#d32f2f";
            streak = 0;
        }

        total++;
        updateStats();
        
        btn.textContent = "Next ->";
        isChecking = false;
        input.disabled = true; 
    }

    function updateStats() {
        streakDisplay.textContent = `Streak: ${streak}`;
        scoreDisplay.textContent = `Correct: ${score}/${total}`;
    }
